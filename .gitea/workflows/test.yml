name: test

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - run: go test ./...
      - run: go run ./cmd/cervomut list-mutators
      - run: go run ./cmd/cervomut fast ./pkg/config --max-mutants 3 --workers 2 --out .cervomut/ci-smoke
      - run: test -f .cervomut/ci-smoke/mutation-report.json
